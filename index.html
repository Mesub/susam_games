<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Susam's Games — a global arcade</title>
  <meta name="description" content="A global arcade of browser games — all built from scratch, all playable offline. Runners, puzzles, arcade classics and more." />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%95%B9%EF%B8%8F%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="logo">🕹️</div>
      <h1>Susam's Games</h1>
    </div>
    <p class="tagline">A global arcade — lots of games, one place. Every game is built from scratch and plays right here in your browser, fully offline.</p>

    <div class="hub-toolbar">
      <input type="search" id="search" class="search" placeholder="🔎 Search games…" aria-label="Search games" autocomplete="off" />
      <div class="filters" id="filters">
        <button class="chip active" data-cat="all">All</button>
        <button class="chip" data-cat="arcade">Arcade</button>
        <button class="chip" data-cat="puzzle">Puzzle</button>
        <button class="chip" data-cat="classic">Classic</button>
      </div>
    </div>

    <div class="grid" id="grid"><!-- game cards injected by js/hub.js --></div>

    <p class="empty" id="empty" hidden>No games match your search. Try another word.</p>

    <footer class="site">🕹️ Susam's Games · <span id="count">0</span> games and counting · built from scratch, plays offline</footer>
  </div>

  <script type="module" src="js/hub.js"></script>
</body>
</html>
