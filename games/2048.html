<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>2048 — Susam's Games</title>
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%A2%3C/text%3E%3C/svg%3E" />
  <style>
    .board2048 {
      position: relative;
      width: min(92vw, 420px);
      aspect-ratio: 1;
      padding: 12px;
      border-radius: var(--radius);
      background: var(--panel-solid);
      border: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 12px;
      touch-action: none;
      user-select: none;
    }
    .board2048 .cell {
      border-radius: 10px;
      background: rgba(120,140,255,0.06);
    }
    .board2048 .tile {
      display: grid;
      place-items: center;
      border-radius: 10px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: #08122a;
      font-size: clamp(20px, 6vw, 34px);
      transition: transform 0.08s ease;
    }
    .t2    { background: #cfe7ff; }
    .t4    { background: #a9d5ff; }
    .t8    { background: #7ab8ff; }
    .t16   { background: #6ea6ff; }
    .t32   { background: #8a7bff; color:#fff; }
    .t64   { background: #b15cff; color:#fff; }
    .t128  { background: #ff7ea8; color:#fff; }
    .t256  { background: #ff5c8a; color:#fff; }
    .t512  { background: #ffb454; }
    .t1024 { background: #ffd166; }
    .t2048 { background: #4ade80; }
    .tbig  { background: #4cc9f0; color:#fff; }
    .pop { animation: pop 0.14s ease; }
    @keyframes pop { 0%{transform:scale(0.6);} 100%{transform:scale(1);} }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../index.html">← All games</a>
    <div class="brand"><div class="logo">🔢</div><h1>2048</h1></div>
    <p class="tagline">Slide tiles, merge matching numbers, reach the 2048 tile.</p>

    <div class="game-shell">
      <div class="game-head">
        <h2>Merge</h2>
        <div class="scoreboard">
          <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
          <div class="stat"><div class="label">Best</div><div class="value" id="best">0</div></div>
        </div>
      </div>

      <div class="stage" id="stage" style="border:none;background:transparent;box-shadow:none;overflow:visible;position:relative;">
        <div class="board2048" id="board"></div>
        <div class="overlay" id="overlay" style="border-radius:var(--radius);">
          <h3 id="ov-title">2048</h3>
          <p id="ov-text">Use the arrow keys or swipe to slide the tiles. When two equal tiles touch, they merge. Reach 2048!</p>
          <button class="btn primary" id="start-btn">▶ Start</button>
        </div>
      </div>

      <p class="controls-hint"><kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd> or swipe · <button class="btn ghost" id="new-btn" style="padding:6px 12px;font-size:13px;">↻ New game</button></p>
    </div>

    <footer class="site">🔢 Susam's Games · 2048</footer>
  </div>

  <script type="module" src="../js/2048.js"></script>
</body>
</html>
