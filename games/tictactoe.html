<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tic-Tac-Toe — Susam's Games</title>
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%AD%95%3C/text%3E%3C/svg%3E" />
  <style>
    .tttgrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: min(88vw, 340px);
    }
    .tttcell {
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel);
      font-size: clamp(44px, 16vw, 76px);
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.08s ease;
      -webkit-user-select: none; user-select: none;
    }
    .tttcell:hover:not(.taken) { border-color: rgba(120,140,255,0.5); transform: translateY(-2px); }
    .tttcell.x { color: var(--neon); }
    .tttcell.o { color: var(--neon-3); }
    .tttcell.win { background: rgba(74,222,128,0.16); border-color: var(--good); }
    .tttcell.taken { cursor: default; }
    .turnline { color: var(--ink-dim); text-align: center; min-height: 20px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../index.html">← All games</a>
    <div class="brand"><div class="logo">⭕</div><h1>Tic-Tac-Toe</h1></div>
    <p class="tagline">Three in a row against an unbeatable AI. Can you force a draw?</p>

    <div class="game-shell">
      <div class="game-head">
        <h2>Play X</h2>
        <div class="scoreboard">
          <div class="stat"><div class="label">Wins</div><div class="value" id="w">0</div></div>
          <div class="stat"><div class="label">Draws</div><div class="value" id="d">0</div></div>
          <div class="stat"><div class="label">Losses</div><div class="value" id="l">0</div></div>
        </div>
      </div>

      <p class="turnline" id="turn">You are ✗ — you move first.</p>

      <div class="stage" id="stage" style="border:none;background:transparent;box-shadow:none;overflow:visible;position:relative;">
        <div class="tttgrid" id="grid"></div>
        <div class="overlay hidden" id="overlay" style="border-radius:var(--radius);">
          <h3 id="ov-title">Round over</h3>
          <p id="ov-text"></p>
          <button class="btn primary" id="start-btn">▶ Play Again</button>
        </div>
      </div>

      <p class="controls-hint">Click or tap a square. The AI plays a perfect game — a draw is the best you can force.</p>
    </div>

    <footer class="site">⭕ Susam's Games · Tic-Tac-Toe</footer>
  </div>

  <script type="module" src="../js/tictactoe.js"></script>
</body>
</html>
