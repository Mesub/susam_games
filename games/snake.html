<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake — Susam's Games</title>
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%8D%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <div class="wrap">
    <a class="back" href="../index.html">← All games</a>
    <div class="brand"><div class="logo">🐍</div><h1>Snake</h1></div>
    <p class="tagline">Eat, grow, don't bite your tail. The classic that never dies.</p>

    <div class="game-shell">
      <div class="game-head">
        <h2>Slither</h2>
        <div class="scoreboard">
          <div class="stat"><div class="label">Score</div><div class="value" id="score">0</div></div>
          <div class="stat"><div class="label">Best</div><div class="value" id="best">0</div></div>
        </div>
      </div>

      <div class="stage" id="stage">
        <canvas id="c" width="480" height="480"></canvas>
        <div class="overlay" id="overlay">
          <h3 id="ov-title">Snake</h3>
          <p id="ov-text">Use the arrow keys or WASD to steer. Grab the apples, avoid the walls and your own tail.</p>
          <button class="btn primary" id="start-btn">▶ Start</button>
        </div>
      </div>

      <p class="controls-hint">
        <kbd>←</kbd> <kbd>↑</kbd> <kbd>↓</kbd> <kbd>→</kbd> / <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> steer &nbsp;·&nbsp; swipe on mobile
      </p>

      <div class="dpad" id="dpad" aria-hidden="true">
        <button class="up" data-act="up">▲</button>
        <button class="left" data-act="left">◀</button>
        <button class="down" data-act="down">▼</button>
        <button class="right" data-act="right">▶</button>
      </div>
    </div>

    <footer class="site">🐍 Susam's Games · Snake</footer>
  </div>

  <script type="module" src="../js/snake.js"></script>
</body>
</html>
