<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Memory Match — Susam's Games</title>
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%83%8F%3C/text%3E%3C/svg%3E" />
  <style>
    .memgrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: min(92vw, 420px);
    }
    .memcard {
      aspect-ratio: 1;
      border: none;
      background: transparent;
      padding: 0;
      perspective: 700px;
      cursor: pointer;
    }
    .memcard .inner {
      position: relative;
      width: 100%; height: 100%;
      transition: transform 0.35s ease;
      transform-style: preserve-3d;
    }
    .memcard.flipped .inner, .memcard.matched .inner { transform: rotateY(180deg); }
    .memcard .face {
      position: absolute; inset: 0;
      display: grid; place-items: center;
      border-radius: 12px;
      backface-visibility: hidden;
      font-size: clamp(28px, 9vw, 44px);
      border: 1px solid var(--border);
    }
    .memcard .front {
      background: linear-gradient(135deg, var(--neon), var(--neon-2));
      color: #06122a;
    }
    .memcard .back {
      background: var(--panel-solid);
      transform: rotateY(180deg);
    }
    .memcard.matched .face { opacity: 0.55; }
    .memcard:disabled { cursor: default; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="../index.html">← All games</a>
    <div class="brand"><div class="logo">🃏</div><h1>Memory Match</h1></div>
    <p class="tagline">Flip cards two at a time and pair them all from memory.</p>

    <div class="game-shell">
      <div class="game-head">
        <h2>Match</h2>
        <div class="scoreboard">
          <div class="stat"><div class="label">Moves</div><div class="value" id="moves">0</div></div>
          <div class="stat"><div class="label">Pairs</div><div class="value" id="pairs">0</div></div>
          <div class="stat"><div class="label">Best</div><div class="value" id="best">—</div></div>
        </div>
      </div>

      <div class="stage" id="stage" style="border:none;background:transparent;box-shadow:none;overflow:visible;position:relative;">
        <div class="memgrid" id="grid"></div>
        <div class="overlay" id="overlay" style="border-radius:var(--radius);">
          <h3 id="ov-title">Memory Match</h3>
          <p id="ov-text">Flip two cards a turn. Find all eight pairs in as few moves as you can.</p>
          <button class="btn primary" id="start-btn">▶ Start</button>
        </div>
      </div>

      <p class="controls-hint">Click or tap two cards to reveal them · <button class="btn ghost" id="new-btn" style="padding:6px 12px;font-size:13px;">↻ New game</button></p>
    </div>

    <footer class="site">🃏 Susam's Games · Memory Match</footer>
  </div>

  <script type="module" src="../js/memory.js"></script>
</body>
</html>
